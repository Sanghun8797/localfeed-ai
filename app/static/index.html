<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>LocalFeed AI 추천 서비스</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>LocalFeed AI</h1>
            <p>샘플 사용자를 선택하면 기본 선호 정보가 자동 입력되며, 직접 수정하여 추천 결과를 확인할 수 있습니다.</p>
        </header>

        <section class="custom-box">
            <h2>개인화 추천 설정</h2>
            <p class="section-desc">
                샘플 사용자를 선택하거나 선호 카테고리, 동네, 가격대를 직접 수정해 추천을 받을 수 있습니다.
            </p>

            <div class="custom-form">
                <label for="userSelect">샘플 사용자</label>
                <select id="userSelect" onchange="loadSelectedUserPreference()"></select>

                <label for="category1">선호 카테고리 1</label>
                <select id="category1">
                    <option value="디지털기기">디지털기기</option>
                    <option value="생활가전">생활가전</option>
                    <option value="가구/인테리어">가구/인테리어</option>
                    <option value="의류">의류</option>
                    <option value="도서">도서</option>
                    <option value="스포츠/레저">스포츠/레저</option>
                    <option value="유아용품">유아용품</option>
                    <option value="반려동물용품">반려동물용품</option>
                    <option value="생활용품">생활용품</option>
                    <option value="게임/취미">게임/취미</option>
                </select>

                <label for="category2">선호 카테고리 2</label>
                <select id="category2">
                    <option value="디지털기기">디지털기기</option>
                    <option value="생활가전">생활가전</option>
                    <option value="가구/인테리어">가구/인테리어</option>
                    <option value="의류">의류</option>
                    <option value="도서">도서</option>
                    <option value="스포츠/레저">스포츠/레저</option>
                    <option value="유아용품">유아용품</option>
                    <option value="반려동물용품">반려동물용품</option>
                    <option value="생활용품">생활용품</option>
                    <option value="게임/취미">게임/취미</option>
                </select>

                <label for="dong">선호 동네</label>
                <select id="dong">
                    <option value="신림동">신림동</option>
                    <option value="봉천동">봉천동</option>
                    <option value="낙성대동">낙성대동</option>
                    <option value="서울대입구">서울대입구</option>
                    <option value="사당동">사당동</option>
                    <option value="상도동">상도동</option>
                    <option value="흑석동">흑석동</option>
                </select>

                <label for="minPrice">최소 가격</label>
                <input type="number" id="minPrice" value="50000">

                <label for="maxPrice">최대 가격</label>
                <input type="number" id="maxPrice" value="200000">

                <label for="topN">추천 개수</label>
                <select id="topN">
                    <option value="5">5개</option>
                    <option value="10" selected>10개</option>
                    <option value="15">15개</option>
                </select>

                <button onclick="loadRecommendations()">추천 받기</button>
            </div>
        </section>

        <section id="userPreference" class="user-preference"></section>

        <section>
            <h2>추천 게시글</h2>
            <div id="recommendationList" class="card-list"></div>
        </section>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
