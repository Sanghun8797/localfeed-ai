<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>당근 동네피드 추천 AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="title-wrap">
                <img src="/static/logoImage.png" alt="서비스 로고" class="title-logo">

                <div>
                    <h1>당근 동네피드 추천 AI</h1>
                    <p>사용자 이름과 선호 조건을 입력하면 개인화된 추천 결과를 확인할 수 있습니다.</p>
                </div>
            </div>
        </header>

        <section class="custom-box">
            <h2>맞춤 추천 조건 입력</h2>
            <p class="section-desc">
                이름, 선호 카테고리, 동네, 가격대를 입력해 맞춤 추천을 받을 수 있습니다.
            </p>

            <div class="custom-form">
                <label for="userName">사용자 이름</label>
                <input type="text" id="userName" value="" placeholder="이름을 입력하세요">

                <div></div>
                <div></div>

                <label for="category1">선호 카테고리 1</label>
                <select id="category1">
                    <option value="" selected disabled>선택하세요</option>
                    <option value="디지털기기">디지털기기</option>
                    <option value="생활가전">생활가전</option>
                    <option value="가구/인테리어">가구/인테리어</option>
                    <option value="의류">의류</option>
                    <option value="도서">도서</option>
                    <option value="스포츠/레저">스포츠/레저</option>
                    <option value="유아용품">유아용품</option>
                    <option value="반려동물용품">반려동물용품</option>
                    <option value="생활용품">생활용품</option>
                    <option value="게임/취미">게임/취미</option>
                </select>

                <label for="category2">선호 카테고리 2</label>
                <select id="category2">
                    <option value="" selected disabled>선택하세요</option>
                    <option value="디지털기기">디지털기기</option>
                    <option value="생활가전">생활가전</option>
                    <option value="가구/인테리어">가구/인테리어</option>
                    <option value="의류">의류</option>
                    <option value="도서">도서</option>
                    <option value="스포츠/레저">스포츠/레저</option>
                    <option value="유아용품">유아용품</option>
                    <option value="반려동물용품">반려동물용품</option>
                    <option value="생활용품">생활용품</option>
                    <option value="게임/취미">게임/취미</option>
                </select>

                <label for="minPrice">최소 가격</label>
                <input type="number" id="minPrice" value="0">

                <label for="maxPrice">최대 가격</label>
                <input type="number" id="maxPrice" value="0">

                <label for="dong">선호 동네</label>
                <select id="dong">
                    <option value="" selected disabled>선택하세요</option>
                    <option value="신림동">신림동</option>
                    <option value="봉천동">봉천동</option>
                    <option value="낙성대동">낙성대동</option>
                    <option value="청룡동">청룡동</option>
                    <option value="대학동">대학동</option>
                    <option value="사당동">사당동</option>
                    <option value="상도동">상도동</option>
                    <option value="흑석동">흑석동</option>
                </select>

                <label for="topN">추천 개수</label>
                <select id="topN">
                    <option value="10" selected>10개</option>
                    <option value="20">20개</option>
                    <option value="30">30개</option>
                </select>

                <button onclick="loadRecommendations()">추천 받기</button>
            </div>
        </section>

        <section id="userPreference" class="user-preference" style="display: none;"></section>

        <section id="recommendationSection" style="display: none;">
            <h2>추천 게시글</h2>
            <div id="recommendationList" class="card-list"></div>
        </section>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
